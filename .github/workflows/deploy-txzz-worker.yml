name: 部署糖心志者云端服务

on:
  push:
    branches:
      - main
      - master
    paths:
      - "txzz-worker/**"
      - ".github/workflows/deploy-txzz-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: 部署 Cloudflare Worker
    runs-on: ubuntu-24.04
    environment: VITE_SUPABASE_URL
    defaults:
      run:
        working-directory: txzz-worker

    steps:
      - name: 检出代码
        uses: actions/checkout@v4.2.2

      - name: 配置 Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.16.0
          cache: npm
          cache-dependency-path: txzz-worker/package-lock.json

      - name: 安装锁定依赖
        run: npm ci

      - name: 执行语法与自动化测试
        run: npm run check

      - name: 检查 GitHub 密钥
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TXZZ_API_AES_KEY: ${{ secrets.TXZZ_API_AES_KEY }}
          TXZZ_CREDENTIAL_KEY: ${{ secrets.TXZZ_CREDENTIAL_KEY }}
        run: |
          node - <<'NODE'
          const required = [
            "CLOUDFLARE_API_TOKEN",
            "CLOUDFLARE_ACCOUNT_ID",
            "SUPABASE_URL",
            "SUPABASE_SERVICE_ROLE_KEY",
            "TXZZ_API_AES_KEY",
            "TXZZ_CREDENTIAL_KEY"
          ];
          const missing = required.filter((key) => !process.env[key]);
          if (missing.length) {
            throw new Error(`缺少 GitHub 密钥：${missing.join(", ")}`);
          }
          console.log("GitHub 密钥完整性检查通过。");
          NODE

      - name: 使用运行密钥部署 Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TXZZ_API_AES_KEY: ${{ secrets.TXZZ_API_AES_KEY }}
          TXZZ_CREDENTIAL_KEY: ${{ secrets.TXZZ_CREDENTIAL_KEY }}
          TXZZ_ACCESS_TOKEN: ${{ secrets.TXZZ_ACCESS_TOKEN }}
          TXZZ_SEED_ACCOUNTS_JSON: ${{ secrets.TXZZ_SEED_ACCOUNTS_JSON }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const required = [
            "SUPABASE_URL",
            "SUPABASE_SERVICE_ROLE_KEY",
            "TXZZ_API_AES_KEY",
            "TXZZ_CREDENTIAL_KEY"
          ];
          const missing = required.filter((key) => !process.env[key]);
          if (missing.length) {
            throw new Error(`缺少 GitHub 密钥：${missing.join(", ")}`);
          }
          const secrets = Object.fromEntries(
            [
              ...required,
              "TXZZ_ACCESS_TOKEN",
              "TXZZ_SEED_ACCOUNTS_JSON"
            ]
              .filter((key) => process.env[key])
              .map((key) => [key, process.env[key]])
          );
          fs.writeFileSync("worker-secrets.json", JSON.stringify(secrets, null, 2));
          NODE
          trap 'rm -f worker-secrets.json' EXIT
          npx wrangler deploy --secrets-file worker-secrets.json | tee deploy-output.txt

      - name: 输出默认 Worker 地址
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          async function main() {
            const output = fs.existsSync("deploy-output.txt") ? fs.readFileSync("deploy-output.txt", "utf8") : "";
            const deployed = output.match(/https:\/\/[^\s]+\.workers\.dev[^\s]*/);
            if (deployed) {
              console.log(`默认 Worker 地址: ${deployed[0]}`);
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## 默认 Worker 地址\n\n${deployed[0]}\n`);
              return;
            }
            const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
            const token = process.env.CLOUDFLARE_API_TOKEN;
            const headers = { authorization: `Bearer ${token}` };
            const res = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}/workers/subdomain`, { headers });
            const data = await res.json();
            if (!res.ok || !data?.result?.subdomain) {
              console.log(`Cloudflare 默认子域名查询失败：${JSON.stringify(data)}`);
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, "## 默认 Worker 地址\n\n本次未能自动读取，请在 Cloudflare Worker 页面复制 `workers.dev` 地址。\n");
              return;
            }
            const url = `https://txzz-secure-pool.${data.result.subdomain}.workers.dev`;
            console.log(`默认 Worker 地址: ${url}`);
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## 默认 Worker 地址\n\n${url}\n`);
          }
          main().catch((error) => {
            console.log(`默认 Worker 地址读取失败: ${error.message}`);
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, "## 默认 Worker 地址\n\n本次未能自动读取，请在 Cloudflare Worker 页面复制 `workers.dev` 地址。\n");
          });
          NODE
