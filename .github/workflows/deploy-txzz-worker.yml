name: Deploy TXZZ Worker

on:
  push:
    branches:
      - main
      - master
    paths:
      - "txzz-worker/**"
      - ".github/workflows/deploy-txzz-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: txzz-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check Worker syntax
        run: npm run check

      - name: Check GitHub secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TXZZ_API_AES_KEY: ${{ secrets.TXZZ_API_AES_KEY }}
          TXZZ_CREDENTIAL_KEY: ${{ secrets.TXZZ_CREDENTIAL_KEY }}
          TXZZ_ADMIN_TOKEN: ${{ secrets.TXZZ_ADMIN_TOKEN }}
          TXZZ_CLIENT_TOKEN: ${{ secrets.TXZZ_CLIENT_TOKEN }}
          TXZZ_SEED_ACCOUNTS_JSON: ${{ secrets.TXZZ_SEED_ACCOUNTS_JSON }}
        run: |
          node - <<'NODE'
          const required = [
            "CLOUDFLARE_API_TOKEN",
            "CLOUDFLARE_ACCOUNT_ID",
            "SUPABASE_URL",
            "SUPABASE_SERVICE_ROLE_KEY",
            "TXZZ_API_AES_KEY",
            "TXZZ_CREDENTIAL_KEY",
            "TXZZ_ADMIN_TOKEN",
            "TXZZ_CLIENT_TOKEN",
            "TXZZ_SEED_ACCOUNTS_JSON"
          ];
          const missing = required.filter((key) => !process.env[key]);
          if (missing.length) {
            throw new Error(`Missing GitHub Secrets: ${missing.join(", ")}`);
          }
          console.log("GitHub Secrets presence check passed.");
          NODE

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: txzz-worker
          command: deploy

      - name: Upload Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TXZZ_API_AES_KEY: ${{ secrets.TXZZ_API_AES_KEY }}
          TXZZ_CREDENTIAL_KEY: ${{ secrets.TXZZ_CREDENTIAL_KEY }}
          TXZZ_ADMIN_TOKEN: ${{ secrets.TXZZ_ADMIN_TOKEN }}
          TXZZ_CLIENT_TOKEN: ${{ secrets.TXZZ_CLIENT_TOKEN }}
          TXZZ_PROXY_SIGNING_KEY: ${{ secrets.TXZZ_PROXY_SIGNING_KEY }}
          TXZZ_SEED_ACCOUNTS_JSON: ${{ secrets.TXZZ_SEED_ACCOUNTS_JSON }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const required = [
            "SUPABASE_URL",
            "SUPABASE_SERVICE_ROLE_KEY",
            "TXZZ_API_AES_KEY",
            "TXZZ_CREDENTIAL_KEY",
            "TXZZ_ADMIN_TOKEN",
            "TXZZ_CLIENT_TOKEN",
            "TXZZ_SEED_ACCOUNTS_JSON"
          ];
          const missing = required.filter((key) => !process.env[key]);
          if (missing.length) {
            throw new Error(`Missing GitHub Secrets: ${missing.join(", ")}`);
          }
          const secrets = Object.fromEntries(
            [
              ...required,
              "TXZZ_PROXY_SIGNING_KEY"
            ]
              .filter((key) => process.env[key])
              .map((key) => [key, process.env[key]])
          );
          fs.writeFileSync("worker-secrets.json", JSON.stringify(secrets, null, 2));
          NODE
          trap 'rm -f worker-secrets.json' EXIT
          npx wrangler secret bulk worker-secrets.json
