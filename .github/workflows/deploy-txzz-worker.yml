name: Deploy TXZZ Worker

on:
  push:
    branches:
      - main
      - master
    paths:
      - "txzz-worker/**"
      - ".github/workflows/deploy-txzz-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    environment: VITE_SUPABASE_URL
    defaults:
      run:
        working-directory: txzz-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check Worker syntax
        run: npm run check

      - name: Check GitHub secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TXZZ_API_AES_KEY: ${{ secrets.TXZZ_API_AES_KEY }}
          TXZZ_CREDENTIAL_KEY: ${{ secrets.TXZZ_CREDENTIAL_KEY }}
          TXZZ_ADMIN_TOKEN: ${{ secrets.TXZZ_ADMIN_TOKEN }}
          TXZZ_CLIENT_TOKEN: ${{ secrets.TXZZ_CLIENT_TOKEN }}
          TXZZ_SEED_ACCOUNTS_JSON: ${{ secrets.TXZZ_SEED_ACCOUNTS_JSON }}
        run: |
          node - <<'NODE'
          const required = [
            "CLOUDFLARE_API_TOKEN",
            "CLOUDFLARE_ACCOUNT_ID",
            "SUPABASE_URL",
            "SUPABASE_SERVICE_ROLE_KEY",
            "TXZZ_API_AES_KEY",
            "TXZZ_CREDENTIAL_KEY",
            "TXZZ_ADMIN_TOKEN",
            "TXZZ_CLIENT_TOKEN",
            "TXZZ_SEED_ACCOUNTS_JSON"
          ];
          const missing = required.filter((key) => !process.env[key]);
          if (missing.length) {
            throw new Error(`Missing GitHub Secrets: ${missing.join(", ")}`);
          }
          console.log("GitHub Secrets presence check passed.");
          NODE

      - name: Deploy with Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TXZZ_API_AES_KEY: ${{ secrets.TXZZ_API_AES_KEY }}
          TXZZ_CREDENTIAL_KEY: ${{ secrets.TXZZ_CREDENTIAL_KEY }}
          TXZZ_ADMIN_TOKEN: ${{ secrets.TXZZ_ADMIN_TOKEN }}
          TXZZ_CLIENT_TOKEN: ${{ secrets.TXZZ_CLIENT_TOKEN }}
          TXZZ_PROXY_SIGNING_KEY: ${{ secrets.TXZZ_PROXY_SIGNING_KEY }}
          TXZZ_SEED_ACCOUNTS_JSON: ${{ secrets.TXZZ_SEED_ACCOUNTS_JSON }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const required = [
            "SUPABASE_URL",
            "SUPABASE_SERVICE_ROLE_KEY",
            "TXZZ_API_AES_KEY",
            "TXZZ_CREDENTIAL_KEY",
            "TXZZ_ADMIN_TOKEN",
            "TXZZ_CLIENT_TOKEN",
            "TXZZ_SEED_ACCOUNTS_JSON"
          ];
          const missing = required.filter((key) => !process.env[key]);
          if (missing.length) {
            throw new Error(`Missing GitHub Secrets: ${missing.join(", ")}`);
          }
          const secrets = Object.fromEntries(
            [
              ...required,
              "TXZZ_PROXY_SIGNING_KEY"
            ]
              .filter((key) => process.env[key])
              .map((key) => [key, process.env[key]])
          );
          fs.writeFileSync("worker-secrets.json", JSON.stringify(secrets, null, 2));
          NODE
          trap 'rm -f worker-secrets.json' EXIT
          npx wrangler deploy --secrets-file worker-secrets.json | tee deploy-output.txt

      - name: Print default Worker URL
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const output = fs.existsSync("deploy-output.txt") ? fs.readFileSync("deploy-output.txt", "utf8") : "";
          const deployed = output.match(/https:\/\/[^\s]+\.workers\.dev[^\s]*/);
          if (deployed) {
            console.log(`默认 Worker 地址: ${deployed[0]}`);
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## 默认 Worker 地址\n\n${deployed[0]}\n`);
            process.exit(0);
          }
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const headers = { authorization: `Bearer ${token}` };
          const res = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}/workers/subdomain`, { headers });
          const data = await res.json();
          if (!res.ok || !data?.result?.subdomain) {
            console.log(`Cloudflare workers.dev subdomain query failed: ${JSON.stringify(data)}`);
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, "## 默认 Worker 地址\n\n本次未能自动读取，请在 Cloudflare Worker 页面复制 `workers.dev` 地址。\n");
            process.exit(0);
          }
          const url = `https://txzz-secure-pool.${data.result.subdomain}.workers.dev`;
          console.log(`默认 Worker 地址: ${url}`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## 默认 Worker 地址\n\n${url}\n`);
          NODE
